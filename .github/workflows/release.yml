name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip package
        run: |
          ZIP_NAME="OreUI-Theme-MC1.12.2-${GITHUB_REF_NAME}.zip"
          zip -r "$ZIP_NAME" assets/ logo.png pack.mcmeta
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OreUI Theme MC1.12.2 ${{ github.ref_name }}"
          files: "*.zip"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
